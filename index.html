<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0B2E33" />
    <title>Entrada</title>
    <link rel="preload" href="./styles.css?v=20260429-181807" as="style" />
    <link rel="stylesheet" href="./styles.css?v=20260429-181807" />
  </head>
  <body class="landing">
    <div class="bg" aria-hidden="true">
      <div class="bg__mosaicTrack" data-bg-mosaic-track>
        <div class="bg__mosaic" data-bg-mosaic></div>
        <div class="bg__mosaic" data-bg-mosaic-clone aria-hidden="true"></div>
      </div>
      <div class="bg__layer" data-bg-layer="a"></div>
      <div class="bg__layer" data-bg-layer="b"></div>
      <div class="bg__overlay" data-bg-overlay></div>
      <div class="bg__vignette" data-bg-vignette></div>
      <div class="grain" data-grain></div>
    </div>

    <div class="gate gate--landing">
      <div class="gate__card">
        <div class="gate__logo" aria-hidden="true"></div>
        <div class="gate__title" data-bind="event.title">PROJECT X</div>
        <div class="gate__hint">
          Toque para abrir o convite.
        </div>
        <a class="btn btn--primary gate__btn" href="./invite.html">
          Abrir convite
        </a>
      </div>
    </div>

    <script src="./app.js?v=20260429-181807"></script>
  </body>
</html>
